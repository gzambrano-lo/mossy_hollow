<!DOCTYPE html>
<!--lang indentifies the language of the page-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--meta name="description" content"..." tag provides brief summary of the webpage content. 
    it's what the search engine displays as the blurb under the page title. keep it under 160 characters -->
    <meta name="description" content="Shop our cozy collection of stationery and collectibles.">
    <title>Mossy Hollow Shop</title>
    <!--link to google font: poppins-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!--link to external CSS file-->
    <link rel="stylesheet" href="../styles/theme.css">
</head>


<body>
    <!-- 1. header -->
    <header>
        <!--you only want one h1 per page, to not confuse the browser/user-->
        <h1>Mossy Hollow Shop</h1>
        <h2>Cozy Stationery and Collectibles</h2>
        <p>Our unique collection of stationery and collectibles inspired by our tiny forest creatures!</p>

        <!--NAV GOES HERE-->
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="/pages/shop.html">Shop</a></li>
                <li><a href="/pages/contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- 2. main -->
    <!--creature introduction-->
    <main>
        <section id="shop-intro">
            <h2>Shop our stationary collection, we have:</h2>
            <ul>
                <li>Journals</li>
                <li>Stickers</li>
                <li>Washi Tapes</li>
                <li>Stamps</li>
                <li>Thank You Cards</li>
            </ul>
            <!--Maybe later expand on a catchier story.-->
        </section>

        <section id="product-images">
            <img src="../images/products/product_line_up.png">
            <img src="../images/products/stamp_set.png">
            <img src="../images/products/thank_you_cards.png">
        </section>
    </main>

    <!-- 3. footer -->
  
</body>

</html>
